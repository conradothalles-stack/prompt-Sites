<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordanoc DEV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <p class="blade">Ordanoc DEV Gerador com Inteligência Artificial</p>
    <h1>Crie sua página
        <br>
        <span>com um prompt</span>
    </h1>
    <p class="kafka">Descreva o seu negócio e veja a IA criar uma página profissional em segundos.</p>
    <div class="caixa-entrada">
        <textarea class="caixa-texto" placeholder="Descreva seu negócio..."></textarea>
        <button onclick="gerarCodigo()">Gerar</button>
    </div>
    <div class="caixa-resultado">
        <p class="bloco-codigo">
                <!-- O código gerado pela IA aparecerá aqui -->
        </p>
        <iframe class="bloco-site"></iframe>
    </div>
</body>
<script src="scripts.js"></script>

</html>
